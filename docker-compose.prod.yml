version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: gps_postgres
    environment:
      POSTGRES_DB: gpstrack
      POSTGRES_USER: gpsadmin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    command: >
      postgres 
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpsadmin -d gpstrack"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - gps-network

  redis:
    image: redis:7-alpine
    container_name: gps_redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - gps-network

  gps-server:
    build:
      context: ./gps-server
      dockerfile: Dockerfile
    container_name: gps_server
    ports:
      - "5000:5000"
      - "5001:5001"
      - "5002:5002"
      - "4000:4000"
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      GPS_GT06_PORT: 5000
      GPS_TK103_PORT: 5001
      GPS_H02_PORT: 5002
      BACKEND_API_URL: http://backend:3001
      GPS_SERVER_KEY: ${GPS_SERVER_KEY:-default-key-change-in-production}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gps-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gps_backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://gpsadmin:${DB_PASSWORD}@postgres:5432/gpstrack
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GPS_SERVER_KEY: ${GPS_SERVER_KEY:-default-key-change-in-production}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gps-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - gps-network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gps_web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gps-network

  nginx:
    image: nginx:alpine
    container_name: gps_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - backend
    restart: unless-stopped
    networks:
      - gps-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  gps-network:
    driver: bridge
